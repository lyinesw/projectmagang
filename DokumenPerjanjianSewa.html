<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Perjanjian Sewa Otomatis - PDFMake</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

<link rel="stylesheet" href="DokumenPerjanjianSewa.css">
</head>
<body>

<h2>Perjanjian Sewa Tanah Nonpertanian dan Bangunan</h2>

<div class="form-container">
    <!-- BAGIAN 1: NOMOR DAN TANGGAL -->
    <div class="form-section">
        <h3>1. Informasi Dasar</h3>
        <input type="text" id="nomor" placeholder="Nomor Dokumen Perjanjian">
    </div>
    
    <div class="form-section">
        <h3>Tanggal Perjanjian</h3>
        <input type="date" id="tgl">
    </div>

    <!-- BAGIAN 2: PIHAK KESATU -->
    <div class="form-section">
        <h3>2. Data Pihak Kesatu</h3>
        <input type="text" id="nama1" placeholder="Nama Pihak Kesatu" maxlength="20">
        <input type="text" id="jabatan" placeholder="Jabatan Pihak Kesatu">
    </div>
    
    <div class="form-section">
        <h3>&nbsp;</h3>
        <select id="status1">
            <option value="" disabled selected>Status Barang</option>
            <option value="pengelola">Pengelola</option>
            <option value="pengguna">Pengguna</option>
        </select>
        <input type="text" id="alamat1" placeholder="Alamat Instansi Pihak Kesatu">
    </div>

    <!-- BAGIAN 3: PIHAK KEDUA -->
    <div class="form-section">
        <h3>3. Data Pihak Kedua</h3>
        <input type="text" id="nama2" placeholder="Nama Pihak Kedua" maxlength="20">
    </div>
    
    <div class="form-section">
        <h3>&nbsp;</h3>
        <input type="text" id="alamat2" placeholder="Alamat Pihak Kedua">
    </div>

    <!-- BAGIAN 4: DATA BARANG -->
    <div class="form-section">
        <h3>4. Data Barang & Objek Sewa</h3>
        <input type="text" id="usaha" placeholder="Kegiatan Usaha" maxlength="30">
    </div>
    
    <div class="form-section">
        <h3>&nbsp;</h3>
        <select id="jenis">
            <option value="" disabled selected>Jenis Barang</option>
            <option value="Tanah">Tanah</option>
            <option value="Bangunan">Bangunan</option>
            <option value="Tanah dan Bangunan">Tanah dan Bangunan</option>
        </select>
    </div>
    
    <div class="form-section">
        <label for="besaran_sewa">Besaran Sewa (Rp):</label>
        <input type="number" id="besaran_sewa" placeholder="contoh: 1250000 (tanpa titik atau koma)">
    </div>

    <!-- TABEL OBJEK SEWA - FULL WIDTH -->
    <div class="form-section full-width">
        <div style="overflow-x: auto;">
            <table style="width:100%; border-collapse:collapse; border:1px solid #ccc;">
            <tr>
                <th style="border:1px solid #ccc; padding:5px; background:#f0f0f0;">No.</th>
                <th style="border:1px solid #ccc; padding:5px; background:#f0f0f0;">Nama Perangkat</th>
                <th style="border:1px solid #ccc; padding:5px; background:#f0f0f0;">KIB</th>
                <th style="border:1px solid #ccc; padding:5px; background:#f0f0f0;">Kode Barang</th>
                <th style="border:1px solid #ccc; padding:5px; background:#f0f0f0;">Nama Barang</th>
                <th style="border:1px solid #ccc; padding:5px; background:#f0f0f0;">Reg</th>
                <th style="border:1px solid #ccc; padding:5px; background:#f0f0f0;">Lokasi</th>
                <th style="border:1px solid #ccc; padding:5px; background:#f0f0f0;">Luas (m²)</th>
                <th style="border:1px solid #ccc; padding:5px; background:#f0f0f0;">Ket.</th>
            </tr>
            <tr>
                <td style="border:1px solid #ccc; padding:5px;"><input type="text" id="tbl_no" value="1" readonly style="width:95%; padding:3px; background:#f4f7fc; color:#000; border:1px solid #ccc;"></td>
                <td style="border:1px solid #ccc; padding:5px;"><input type="text" id="tbl_nama_perangkat" placeholder="Badan Keuangan Daerah" style="width:95%; padding:3px;"></td>
                <td style="border:1px solid #ccc; padding:5px;"><input type="text" id="tbl_kib" placeholder="A" pattern="[A-Fa-f]{1}" inputmode="text" title="Hanya 1 huruf: A, B, C, D, E, atau F" style="width:95%; padding:3px;" maxlength="1"></td>
                <td style="border:1px solid #ccc; padding:5px;"><textarea id="tbl_kode_barang" placeholder="1.3.1.01.001.004.001" pattern="[0-9.]+" inputmode="numeric" title="Hanya angka dan titik diperbolehkan" style="width:95%; padding:3px; height:60px; resize:none;"></textarea></td>
                <td style="border:1px solid #ccc; padding:5px;"><textarea id="tbl_nama_barang" placeholder="Tanah Bangunan"style="width:95%; padding:3px; height:60px; resize:none;"></textarea></td>
                <td style="border:1px solid #ccc; padding:5px;"><input type="text" id="tbl_reg" placeholder="0001" pattern="[0-9]+" inputmode="numeric" title="Hanya angka diperbolehkan" style="width:95%; padding:3px;" maxlength="4"></td>
                <td style="border:1px solid #ccc; padding:5px;"><textarea id="tbl_lokasi" placeholder="Jalan K.H. Wahid Hasyim Nomor 2,
Karanganyar, Gedung BKD" style="width:95%; padding:3px; height:60px; resize:none;"></textarea></td>
                <td style="border:1px solid #ccc; padding:5px;"><input type="text" id="tbl_luas" placeholder="64" pattern="[0-9]+" inputmode="numeric" title="Hanya angka diperbolehkan" style="width:95%; padding:3px;"></td>
                <td style="border:1px solid #ccc; padding:5px;"><input type="text" id="tbl_ket" placeholder="-" style="width:95%; padding:3px;"></td>
            </tr>
            </table>
        </div>
    </div>

    <button onclick="generatePDF()">Buat Dokumen (PDF)</button>
</div>

<script src="DokumenPerjanjianSewa.js"></script>

</body>
</html>
